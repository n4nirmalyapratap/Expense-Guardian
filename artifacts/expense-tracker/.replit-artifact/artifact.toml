kind = "mobile"
previewPath = "/"
title = "Expense Tracker"
version = "1.0.0"
id = "artifacts/expense-tracker"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 23071

[services.development]
run = "pnpm --filter @workspace/expense-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/expense-tracker", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/expense-tracker", "run", "serve" ]

[services.env]
PORT = "23071"
BASE_PATH = "/"
